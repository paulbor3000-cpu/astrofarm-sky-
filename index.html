<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Astrofarm Sky</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block}

#hd{position:fixed;top:0;left:0;right:0;padding:48px 16px 12px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);z-index:10;pointer-events:none}
.logo{color:#fff;font-size:13px;font-weight:700;letter-spacing:3px}
.logo span{color:#4dff91}
#td{color:rgba(255,255,255,0.45);font-size:11px;text-align:right}

#ctrl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.btn{background:rgba(0,0,0,0.75);border:1px solid rgba(77,255,145,0.35);color:#fff;padding:9px 18px;border-radius:50px;font-size:12px;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);letter-spacing:0.5px}
.btn.on{background:rgba(77,255,145,0.15);border-color:#4dff91;color:#4dff91}

#zc{position:fixed;right:16px;bottom:80px;display:flex;flex-direction:column;gap:8px;z-index:10}
.zb{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

#info{position:fixed;bottom:0;left:0;right:0;background:rgba(5,15,10,0.97);border-top:1px solid rgba(77,255,145,0.2);padding:20px 20px 38px;z-index:20;transform:translateY(100%);transition:transform 0.3s ease;max-height:58vh;overflow-y:auto;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
#info.show{transform:translateY(0)}
#ic{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:14px;cursor:pointer}
.it{color:#4dff91;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.in{color:#fff;font-size:22px;font-weight:700;margin-bottom:3px}
.is{color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:12px}
.id{color:rgba(255,255,255,0.8);font-size:14px;line-height:1.65;margin-bottom:16px}
.ist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.isc{background:rgba(77,255,145,0.06);border:1px solid rgba(77,255,145,0.1);border-radius:10px;padding:9px 11px}
.isl{color:rgba(255,255,255,0.35);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.isv{color:#fff;font-size:14px;font-weight:600;margin-top:1px}
.ia{display:flex;gap:8px}
.iab{flex:1;padding:12px;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.iab.p{background:#4dff91;color:#000}
.iab.s{background:rgba(77,255,145,0.1);color:#4dff91;border:1px solid rgba(77,255,145,0.3)}

#ar-bar{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(77,255,145,0.12);border:1px solid rgba(77,255,145,0.35);color:#4dff91;padding:6px 16px;border-radius:20px;font-size:11px;letter-spacing:1px;display:none;z-index:10}
#ar-bar.show{display:block}

#load{position:fixed;top:0;left:0;right:0;bottom:0;background:#050f0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.8s}
#load.hide{opacity:0;pointer-events:none}
.lr{width:56px;height:56px;border-radius:50%;border:2px solid rgba(77,255,145,0.15);border-top-color:#4dff91;animation:spin 1s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.ll{color:#fff;font-size:13px;font-weight:700;letter-spacing:3px;margin-bottom:32px}
.ll span{color:#4dff91}
.lt{color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:1px}
</style>
</head>

</div>

// ── ASTRONOMY ────────────────────────────────────────
const D2R=Math.PI/180, R2D=180/Math.PI;
let LAT=37.7,LON=-2.1;

function jd(){return Date.now()/86400000+2440587.5}
function gmst(j){return((280.46061837+360.98564736629*(j-2451545))%360+360)%360}
function lst(j,lon){return((gmst(j)+lon)%360+360)%360}

function toAltAz(ra_h,dec_d){
  const j=jd(),ha=lst(j,LON)-ra_h*15;
  const haR=ha*D2R,decR=dec_d*D2R,latR=LAT*D2R;
  const sinA=Math.sin(decR)*Math.sin(latR)+Math.cos(decR)*Math.cos(latR)*Math.cos(haR);
  const alt=Math.asin(Math.max(-1,Math.min(1,sinA)))*R2D;
  const cosAz=(Math.sin(decR)-Math.sin(latR)*sinA)/(Math.cos(latR)*Math.cos(alt*D2R));
  let az=Math.acos(Math.max(-1,Math.min(1,cosAz)))*R2D;
  if(Math.sin(haR)>0) az=360-az;
  return{alt,az};
}

function planetPos(p){
  const j=jd();
  const M=((p.ml-p.lp)+360/p.period*(j-2451545))%360;
  const Mr=M*D2R,C=(2*p.e-p.e**3/4)*Math.sin(Mr)+(5/4*p.e**2)*Math.sin(2*Mr);
  const nu=M+C*R2D,lEcl=(nu+p.lp)%360;
  const eps=23.439,lR=lEcl*D2R,eR=eps*D2R;
  const ra_r=Math.atan2(Math.sin(lR)*Math.cos(eR),Math.cos(lR));
  const dec_r=Math.asin(Math.sin(eR)*Math.sin(lR));
  return{ra:((ra_r*R2D%360+360)%360)/15,dec:dec_r*R2D};
}

function moonPos(){
  const j=jd(),L=(218.316+13.176396*(j-2451545))%360;
  const M=(134.963+13.064993*(j-2451545))%360*D2R;
  const F=(93.272+13.22935*(j-2451545))%360*D2R;
  const lo=L+6.289*Math.sin(M),la=5.128*Math.sin(F);
  const eps=23.439,lR=lo*D2R,laR=la*D2R,eR=eps*D2R;
  const ra_r=Math.atan2(Math.sin(lR)*Math.cos(eR)-Math.tan(laR)*Math.sin(eR),Math.cos(lR));
  const dec_r=Math.asin(Math.sin(laR)*Math.cos(eR)+Math.cos(laR)*Math.sin(eR)*Math.sin(lR));
  const sM=(357.529+0.9856*(j-2451545))%360*D2R;
  const sLon=280.459+0.985647*(j-2451545)+1.915*Math.sin(sM);
  const phase=((lo-sLon)%360+360)%360/360;
  return{ra:((ra_r*R2D%360+360)%360)/15,dec:dec_r*R2D,phase};
}

function phaseName(p){
  if(p<0.02||p>0.98)return'New Moon';
  if(p<0.23)return'Waxing Crescent';
  if(p<0.27)return'First Quarter';
  if(p<0.48)return'Waxing Gibbous';
  if(p<0.52)return'Full Moon';
  if(p<0.73)return'Waning Gibbous';
  if(p<0.77)return'Last Quarter';
  return'Waning Crescent';
}

// B-V to RGB
function bvToRgb(bv){
  if(bv<-0.25)return new THREE.Color(0.8,0.88,1.0);
  if(bv<0.0) return new THREE.Color(0.88,0.93,1.0);
  if(bv<0.3) return new THREE.Color(1.0,1.0,1.0);
  if(bv<0.58)return new THREE.Color(1.0,0.98,0.9);
  if(bv<1.0) return new THREE.Color(1.0,0.88,0.65);
  if(bv<1.5) return new THREE.Color(1.0,0.72,0.38);
  return new THREE.Color(1.0,0.55,0.2);
}

// Projection: Alt/Az → screen X/Y
function project(alt,az){
  if(alt<-15) return null;
  const dAz=((az-vAz+540)%360)-180;
  const dAlt=alt-vAlt;
  const scale=Math.min(W,H)*0.46/(90/zoom);
  return{x:dAz*scale,y:dAlt*scale};
}

function buildMilkyWay(){
  // Milky Way band as many faint stars
  const MW_BAND=[
    [6.0,-50],[7.0,-30],[8.0,-10],[9.5,10],[11.0,30],[13.0,50],[15.0,65],
    [17.0,50],[18.0,25],[18.3,5],[18.5,-10],[19.0,-30],[20.0,-50],
    [22.0,-55],[0.0,-45],[2.0,-42],[4.0,-44],[5.5,-48],[6.0,-50],
  ];

  const N=3000;
  const pos=new Float32Array(N*3);
  const col=new Float32Array(N*3);

  for(let i=0;i<N;i++){
    // Random point along MW band
    const t=(i/N)*MW_BAND.length;
    const i0=Math.floor(t)%MW_BAND.length;
    const i1=(i0+1)%MW_BAND.length;
    const f=t-Math.floor(t);
    const ra=MW_BAND[i0][0]+(MW_BAND[i1][0]-MW_BAND[i0][0])*f;
    const dec=MW_BAND[i0][1]+(MW_BAND[i1][1]-MW_BAND[i0][1])*f;
    const spread=(Math.random()-0.5)*18;
    const spreadAlt=(Math.random()-0.5)*12;

    pos[i*3]=ra+spread;
    pos[i*3+1]=dec+spreadAlt;
    pos[i*3+2]=0;

    const bright=0.08+Math.random()*0.18;
    col[i*3]=bright*0.85;
    col[i*3+1]=bright*0.9;
    col[i*3+2]=bright;
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));

  const mat=new THREE.PointsMaterial({
    size:1.2,vertexColors:true,transparent:true,opacity:0.55,sizeAttenuation:false
  });

  mwPoints=new THREE.Points(geo,mat);
  mwPoints.userData.type='milkyway';
  scene.add(mwPoints);
}

function buildBackground(){
  const N=2500;
  const pos=new Float32Array(N*3);
  const col=new Float32Array(N*3);
  const sz=new Float32Array(N);

  for(let i=0;i<N;i++){
    const s1=Math.sin(i*127.1)*0.5+0.5;
    const s2=Math.sin(i*311.7)*0.5+0.5;
    const s3=Math.sin(i*74.3)*0.5+0.5;
    pos[i*3]=s1*360;
    pos[i*3+1]=s2*85+(s3-0.5)*20;
    pos[i*3+2]=0;
    const b=0.1+s3*0.25;
    col[i*3]=b;col[i*3+1]=b;col[i*3+2]=b*1.05;
    sz[i]=s3*1.2+0.3;
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));

  const mat=new THREE.PointsMaterial({size:1.0,vertexColors:true,sizeAttenuation:false});
  bgPoints=new THREE.Points(geo,mat);
  bgPoints.userData.type='bg';
  scene.add(bgPoints);
}

// Star vertex shader — beautiful gaussian disks
const starVS=`
attribute float starSize;
attribute vec3 starColor;
varying vec3 vColor;
void main(){
  vColor=starColor;
  vec4 mv=modelViewMatrix*vec4(position,1.0);
  gl_PointSize=starSize;
  gl_Position=projectionMatrix*mv;
}`;

const starFS=`
varying vec3 vColor;
void main(){
  vec2 c=gl_PointCoord-vec2(0.5);
  float r=length(c)*2.0;
  float a=exp(-r*r*3.0);
  if(a<0.02) discard;
  gl_FragColor=vec4(vColor,a);
}`;

function buildScene(){
  // Named stars
  const N=STARS.length;
  const pos=new Float32Array(N*3);
  const col=new Float32Array(N*3);
  const sz=new Float32Array(N);

  for(let i=0;i<N;i++){
    const s=STARS[i];
    pos[i*3]=s[1]*15; // RA as angle (will be converted in update)
    pos[i*3+1]=s[2];  // Dec
    pos[i*3+2]=0;
    const c=bvToRgb(s[4]);
    col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;
    sz[i]=Math.max(2,Math.min(18,(5.5-s[3])*2.2*Math.sqrt(zoom)));
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('starColor',new THREE.BufferAttribute(col,3));
  geo.setAttribute('starSize',new THREE.BufferAttribute(sz,1));

  const mat=new THREE.ShaderMaterial({
    vertexShader:starVS,fragmentShader:starFS,
    transparent:true,depthWrite:false,
  });

  starPoints=new THREE.Points(geo,mat);
  scene.add(starPoints);

  // DSOs
  dsoGroup=new THREE.Group();
  scene.add(dsoGroup);

  // Constellation lines
  lineGroup=new THREE.Group();
  scene.add(lineGroup);

  // Planets
  planetGroup=new THREE.Group();
  scene.add(planetGroup);

  updatePositions();
}

function dsoColor(type){
  switch(type){
    case 'galaxy':return 0xffaa44;
    case 'nebula':return 0x44aaff;
    case 'remnant':return 0xff6666;
    case 'planetary_neb':return 0x44ffaa;
    case 'dark_nebula':return 0x555555;
    case 'cluster_open':return 0xffff88;
    case 'cluster_glob':return 0xffcc88;
    default:return 0xffffff;
  }
}

function updatePositions(){
  const starPos=starPoints.geometry.attributes.position;
  const starSz=starPoints.geometry.attributes.starSize;

  starScreenPos=[];

  for(let i=0;i<STARS.length;i++){
    const s=STARS[i];
    const pos=toAltAz(s[1],s[2]);
    const sp=project(pos.alt,pos.az);

    if(sp && pos.alt>-5){
      starPos.setXYZ(i,sp.x,sp.y,0);
      starSz.setX(i,Math.max(2,Math.min(22,(5.5-s[3])*2.2*Math.sqrt(zoom))));
      starScreenPos.push({i,x:sp.x,y:sp.y,star:s,pos,sz:starSz.getX(i)});
    } else {
      starPos.setXYZ(i,99999,99999,0);
    }
  }
  starPos.needsUpdate=true;
  starSz.needsUpdate=true;

  // Milky Way update
  const mwPos=mwPoints.geometry.attributes.position;
  const MW_BAND=[[6.0,-50],[7.0,-30],[8.0,-10],[9.5,10],[11.0,30],[13.0,50],[15.0,65],[17.0,50],[18.0,25],[18.3,5],[18.5,-10],[19.0,-30],[20.0,-50],[22.0,-55],[0.0,-45],[2.0,-42],[4.0,-44],[5.5,-48],[6.0,-50]];
  const N=mwPos.count;
  for(let i=0;i<N;i++){
    const t=(i/N)*MW_BAND.length;
    const i0=Math.floor(t)%MW_BAND.length;
    const i1=(i0+1)%MW_BAND.length;
    const f=t-Math.floor(t);
    const ra=MW_BAND[i0][0]+(MW_BAND[i1][0]-MW_BAND[i0][0])*f;
    const dec=MW_BAND[i0][1]+(MW_BAND[i1][1]-MW_BAND[i0][1])*f;
    const spread=Math.sin(i*17.3)*9;
    const spreadA=Math.sin(i*23.7)*6;
    const p=toAltAz(ra+spread/15,dec+spreadA);
    const sp=project(p.alt,p.az);
    if(sp)mwPos.setXYZ(i,sp.x,sp.y,0);
    else mwPos.setXYZ(i,99999,99999,0);
  }
  mwPos.needsUpdate=true;

  // Background stars
  const bgPos=bgPoints.geometry.attributes.position;
  for(let i=0;i<bgPos.count;i++){
    const s1=Math.sin(i*127.1)*0.5+0.5;
    const s2=Math.sin(i*311.7)*0.5+0.5;
    const ra=s1*24;
    const dec=s2*170-85;
    const p=toAltAz(ra,dec);
    const sp=project(p.alt,p.az);
    if(sp)bgPos.setXYZ(i,sp.x,sp.y,0);
    else bgPos.setXYZ(i,99999,99999,0);
  }
  bgPos.needsUpdate=true;

  // DSOs
  while(dsoGroup.children.length) dsoGroup.remove(dsoGroup.children[0]);
  dsoScreenPos=[];

  DSOS.forEach((dso,idx)=>{
    const [name,ra,dec,type,vmag,sz_d,desc,con,id]=dso;
    const pos=toAltAz(ra,dec);
    if(pos.alt<-5) return;
    const sp=project(pos.alt,pos.az);
    if(!sp) return;

    const pxSz=Math.max(8,sz_d*Math.min(W,H)*0.46/90*zoom*0.4);
    const col=new THREE.Color(dsoColor(type));
    const mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.75,linewidth:1});

    let mesh;
    if(type==='galaxy'){
      const pts=[];
      for(let a=0;a<=64;a++){
        const angle=a/64*Math.PI*2;
        pts.push(new THREE.Vector3(sp.x+Math.cos(angle)*pxSz,sp.y+Math.sin(angle)*pxSz*0.55,0));
      }
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      mesh=new THREE.Line(geo,mat);
    } else if(type==='cluster_open'){
      const pts=[];
      for(let a=0;a<=32;a++){
        const angle=a/32*Math.PI*2;
        pts.push(new THREE.Vector3(sp.x+Math.cos(angle)*pxSz,sp.y+Math.sin(angle)*pxSz,0));
      }
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      const dashedMat=new THREE.LineDashedMaterial({color:col,transparent:true,opacity:0.75,dashSize:4,gapSize:3});
      mesh=new THREE.Line(geo,dashedMat);
      mesh.computeLineDistances();
    } else if(type==='cluster_glob'){
      const pts1=[],pts2=[];
      for(let a=0;a<=32;a++){const ag=a/32*Math.PI*2;pts1.push(new THREE.Vector3(sp.x+Math.cos(ag)*pxSz,sp.y+Math.sin(ag)*pxSz,0));}
      pts2.push(new THREE.Vector3(sp.x-pxSz,sp.y,0),new THREE.Vector3(sp.x+pxSz,sp.y,0));
      pts2.push(new THREE.Vector3(sp.x,sp.y-pxSz,0),new THREE.Vector3(sp.x,sp.y+pxSz,0));
      const g=new THREE.Group();
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1),mat));
      g.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts2),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.35})));
      mesh=g;
    } else if(type==='planetary_neb'){
      const pts1=[],pts2=[];
      for(let a=0;a<=32;a++){const ag=a/32*Math.PI*2;pts1.push(new THREE.Vector3(sp.x+Math.cos(ag)*pxSz*.5,sp.y+Math.sin(ag)*pxSz*.5,0));}
      for(let a=0;a<=32;a++){const ag=a/32*Math.PI*2;pts2.push(new THREE.Vector3(sp.x+Math.cos(ag)*pxSz*.8,sp.y+Math.sin(ag)*pxSz*.8,0));}
      const g=new THREE.Group();
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1),mat));
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.3})));
      mesh=g;
    } else {
      // nebula / remnant / dark
      const h=pxSz,s2=pxSz*0.5;
      const pts=[
        new THREE.Vector3(sp.x-s2,sp.y-s2,0),new THREE.Vector3(sp.x+s2,sp.y-s2,0),
        new THREE.Vector3(sp.x+s2,sp.y+s2,0),new THREE.Vector3(sp.x-s2,sp.y+s2,0),
        new THREE.Vector3(sp.x-s2,sp.y-s2,0),
      ];
      const dashedMat=new THREE.LineDashedMaterial({color:col,transparent:true,opacity:0.7,dashSize:3,gapSize:3});
      mesh=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),dashedMat);
      mesh.computeLineDistances();
    }

    if(mesh){
      dsoGroup.add(mesh);
      dsoScreenPos.push({x:sp.x,y:sp.y,dso,pos,pxSz});
    }

    // DSO label for bright ones
    if(vmag<8&&zoom>0.7){
      const canvas2=document.createElement('canvas');
      canvas2.width=120;canvas2.height=24;
      const ctx=canvas2.getContext('2d');
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.font='10px -apple-system,sans-serif';
      ctx.fillText(id||name,2,16);
      const tex=new THREE.CanvasTexture(canvas2);
      const sm=new THREE.SpriteMaterial({map:tex,transparent:true});
      const sprite=new THREE.Sprite(sm);
      sprite.position.set(sp.x+pxSz+6,sp.y,1);
      sprite.scale.set(60,12,1);
      dsoGroup.add(sprite);
    }
  });

  // Constellation lines
  while(lineGroup.children.length) lineGroup.remove(lineGroup.children[0]);
  const starMap={};
  STARS.forEach(s=>starMap[s[0]]=s);
  const lmat=new THREE.LineBasicMaterial({color:0x1a4dcc,transparent:true,opacity:0.18,linewidth:1});

  Object.values(CON_LINES).forEach(lines=>{
    lines.forEach(([n1,n2])=>{
      const s1=starMap[n1],s2=starMap[n2];
      if(!s1||!s2) return;
      const p1=toAltAz(s1[1],s1[2]),p2=toAltAz(s2[1],s2[2]);
      const sp1=project(p1.alt,p1.az),sp2=project(p2.alt,p2.az);
      if(!sp1||!sp2) return;
      if(p1.alt<-5||p2.alt<-5) return;
      const geo=new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(sp1.x,sp1.y,0),
        new THREE.Vector3(sp2.x,sp2.y,0)
      ]);
      lineGroup.add(new THREE.Line(geo,lmat));
    });
  });

  // Planets
  while(planetGroup.children.length) planetGroup.remove(planetGroup.children[0]);
  planetScreenPos=[];

  PLANETS.forEach(p=>{
    const coords=planetPos(p);
    const pos=toAltAz(coords.ra,coords.dec);
    if(pos.alt<-5) return;
    const sp=project(pos.alt,pos.az);
    if(!sp) return;

    const sz=p.r*Math.sqrt(zoom);
    const col=new THREE.Color(p.col);

    // Glow
    const glowGeo=new THREE.CircleGeometry(sz*2.5,16);
    const glowMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.15});
    const glow=new THREE.Mesh(glowGeo,glowMat);
    glow.position.set(sp.x,sp.y,0);
    planetGroup.add(glow);

    // Planet disk
    const geo=new THREE.CircleGeometry(sz,16);
    const mat=new THREE.MeshBasicMaterial({color:col});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(sp.x,sp.y,0);
    planetGroup.add(mesh);

    // Label
    const canvas2=document.createElement('canvas');
    canvas2.width=100;canvas2.height=20;
    const ctx=canvas2.getContext('2d');
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='11px -apple-system,sans-serif';
    ctx.fillText(p.name,2,14);
    const tex=new THREE.CanvasTexture(canvas2);
    const sm=new THREE.SpriteMaterial({map:tex,transparent:true});
    const sprite=new THREE.Sprite(sm);
    sprite.position.set(sp.x+sz+6,sp.y,1);
    sprite.scale.set(50,10,1);
    planetGroup.add(sprite);

    planetScreenPos.push({x:sp.x,y:sp.y,planet:p,pos,sz});
  });

  // Moon
  updateMoon();

  // Star labels
  buildStarLabels();
}

function updateMoon(){
  const existingMoon=scene.getObjectByName('moon');
  if(existingMoon) scene.remove(existingMoon);

  const m=moonPos();
  const pos=toAltAz(m.ra,m.dec);
  if(pos.alt<-5){moonScreenPos={};return;}
  const sp=project(pos.alt,pos.az);
  if(!sp){moonScreenPos={};return;}

  const mr=10*Math.sqrt(zoom);
  const g=new THREE.Group();
  g.name='moon';

  // Glow
  const glowGeo=new THREE.CircleGeometry(mr*2.5,32);
  const glowMat=new THREE.MeshBasicMaterial({color:0xffffe0,transparent:true,opacity:0.12});
  g.add(new THREE.Mesh(glowGeo,glowMat));

  // Bright part
  const moonGeo=new THREE.CircleGeometry(mr,32);
  const moonMat=new THREE.MeshBasicMaterial({color:0xe8e0d0});
  const moon=new THREE.Mesh(moonGeo,moonMat);
  g.add(moon);

  // Dark part (phase)
  const phase=m.phase;
  const offset=mr*Math.cos(phase*Math.PI*2);
  const darkGeo=new THREE.CircleGeometry(mr,32);
  const darkMat=new THREE.MeshBasicMaterial({color:0x111111});
  const dark=new THREE.Mesh(darkGeo,darkMat);
  dark.position.x=phase<0.5?offset:-offset;
  // clip to moon circle using renderOrder
  dark.renderOrder=1;
  g.add(dark);

  // Label
  const canvas2=document.createElement('canvas');
  canvas2.width=160;canvas2.height=20;
  const ctx=canvas2.getContext('2d');
  ctx.fillStyle='rgba(255,255,220,0.85)';
  ctx.font='11px -apple-system,sans-serif';
  ctx.fillText('Moon · '+phaseName(phase),2,14);
  const tex=new THREE.CanvasTexture(canvas2);
  const sm=new THREE.SpriteMaterial({map:tex,transparent:true});
  const sprite=new THREE.Sprite(sm);
  sprite.position.set(mr+8,0,1);
  sprite.scale.set(80,10,1);
  g.add(sprite);

  g.position.set(sp.x,sp.y,0);
  scene.add(g);

  moonScreenPos={x:sp.x,y:sp.y,phase:m.phase,sz:mr};
}

// Star name labels
let labelGroup=new THREE.Group();
function buildStarLabels(){
  scene.remove(labelGroup);
  labelGroup=new THREE.Group();

  if(zoom<0.5) return;

  starScreenPos.forEach(({x,y,star,sz})=>{
    if(star[3]>2.8) return;
    const canvas2=document.createElement('canvas');
    canvas2.width=100;canvas2.height=18;
    const ctx=canvas2.getContext('2d');
    ctx.fillStyle=`rgba(255,255,255,${Math.min(0.85,0.4+zoom*0.3)})`;
    ctx.font=`${Math.min(11,9*zoom)}px -apple-system,sans-serif`;
    ctx.fillText(star[0],2,13);
    const tex=new THREE.CanvasTexture(canvas2);
    const sm=new THREE.SpriteMaterial({map:tex,transparent:true});
    const sprite=new THREE.Sprite(sm);
    sprite.position.set(x+sz/2+4,y,1);
    sprite.scale.set(50,9,1);
    labelGroup.add(sprite);
  });

  scene.add(labelGroup);
}

// ── HORIZON ──────────────────────────────────────────
function buildHorizon(){
  const existH=scene.getObjectByName('horizon');
  if(existH) scene.remove(existH);
  if(vAlt<5) return;

  const sc=Math.min(W,H)*0.46/(90/zoom);
  const hY=-vAlt*sc;

  if(hY>H/2) return;

  const geo=new THREE.PlaneGeometry(W*3,H*3);
  const mat=new THREE.MeshBasicMaterial({color:0x0a1a06,transparent:true,opacity:0.35});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.name='horizon';
  mesh.position.set(0,hY-H*1.5,0);
  scene.add(mesh);

  // Horizon line
  const pts=[new THREE.Vector3(-W*1.5,hY,0),new THREE.Vector3(W*1.5,hY,0)];
  const lmat=new THREE.LineBasicMaterial({color:0x336633,transparent:true,opacity:0.2});
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lmat);
  line.name='horizon';
  scene.add(line);

  // Compass points
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const sc2=Math.min(W,H)*0.46/(90/zoom);
  dirs.forEach((d,i)=>{
    const az=i*45;
    const dAz=((az-vAz+540)%360)-180;
    const x=dAz*sc2;
    if(Math.abs(x)>W*0.6) return;
    const canvas2=document.createElement('canvas');
    canvas2.width=24;canvas2.height=20;
    const ctx=canvas2.getContext('2d');
    ctx.fillStyle='rgba(77,255,145,0.7)';
    ctx.font='bold 11px -apple-system,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(d,12,14);
    const tex=new THREE.CanvasTexture(canvas2);
    const sm=new THREE.SpriteMaterial({map:tex,transparent:true});
    const sprite=new THREE.Sprite(sm);
    sprite.name='horizon';
    sprite.position.set(x,hY+14,1);
    sprite.scale.set(16,12,1);
    scene.add(sprite);
  });
}

// ── RENDER LOOP ──────────────────────────────────────
let frameCount=0;
function render(){
  requestAnimationFrame(render);
  frameCount++;

  // Update positions every few frames for performance
  if(frameCount%3===0){
    updatePositions();
    buildHorizon();
    updateTimeDisplay();
  }

  renderer.render(scene,camera);
}

function updateTimeDisplay(){
  const n=new Date();
  const h=n.getHours().toString().padStart(2,'0');
  const m=n.getMinutes().toString().padStart(2,'0');
  document.getElementById('td').textContent=`${h}:${m} · ${LAT.toFixed(1)}°${LAT>=0?'N':'S'}`;
}

// ── TOUCH/MOUSE HANDLING ─────────────────────────────
const canvas3=document.getElementById('c');

canvas3.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    panning=true;
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;
    tsx=lx;tsy=ly;ts=Date.now();moved=false;
  } else if(e.touches.length===2){
    panning=false;
    pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});

canvas3.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&panning&&!arMode){
    const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;
    if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
    const sc=(90/zoom)/(Math.min(W,H)*0.46);
    vAz=(vAz-dx*sc+360)%360;
    vAlt=Math.max(-10,Math.min(88,vAlt+dy*sc));
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinch>0) zoom=Math.max(0.3,Math.min(6,zoom*(d/pinch)));
    pinch=d;moved=true;
  }
},{passive:false});

canvas3.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!moved&&e.changedTouches.length===1){
    const x=e.changedTouches[0].clientX-W/2;
    const y=-(e.changedTouches[0].clientY-H/2);
    if(Date.now()-ts<300&&Math.hypot(x+W/2-tsx,y+H/2-tsy)<12){
      handleTap(x,y);
    }
  }
  panning=false;
},{passive:false});

function handleTap(x,y){
  let best=null,bd=35;

  // Stars
  starScreenPos.forEach(s=>{
    const d=Math.hypot(s.x-x,s.y-y);
    const hit=Math.max(s.sz,14);
    if(d<hit&&d<bd){bd=d;best={type:'star',data:s};}
  });

  // DSOs
  dsoScreenPos.forEach(d=>{
    const dist=Math.hypot(d.x-x,d.y-y);
    if(dist<Math.max(d.pxSz*1.5,22)&&dist<bd){bd=dist;best={type:'dso',data:d};}
  });

  // Planets
  planetScreenPos.forEach(p=>{
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<28&&d<bd){bd=d;best={type:'planet',data:p};}
  });

  // Moon
  if(moonScreenPos.x!==undefined){
    const d=Math.hypot(moonScreenPos.x-x,moonScreenPos.y-y);
    if(d<28&&d<bd){bd=d;best={type:'moon',data:moonScreenPos};}
  }

  if(best) showInfo(best);
  else closeInfo();
}

// ── INFO PANEL ────────────────────────────────────────
function showInfo(obj){
  selectedObj=obj;
  let type_l,name,sub,desc,stats=[];

  if(obj.type==='star'){
    const s=obj.data.star;
    const [nm,ra,dec,vmag,bv,con]=s;
    type_l='STAR · '+con.toUpperCase();
    name=nm;
    sub=`Magnitude ${vmag} · ${spectralType(bv)} · ${con}`;
    desc=STAR_DESC[nm]||`A ${spectralType(bv)} star of magnitude ${vmag} in ${con}.`;
    stats=[{l:'Magnitude',v:vmag.toFixed(2)},{l:'Spectral Type',v:spectralType(bv)},{l:'Altitude',v:obj.data.pos.alt.toFixed(1)+'°'},{l:'Azimuth',v:obj.data.pos.az.toFixed(0)+'°'}];
  } else if(obj.type==='dso'){
    const d=obj.data.dso;
    const [nm,ra,dec,type,vmag,sz,dc,con,id]=d;
    type_l=dsoTypeLabel(type)+' · '+con.toUpperCase();
    name=nm;sub=(id?id+' · ':'')+`Magnitude ${vmag} · ${con}`;
    desc=dc;
    stats=[{l:'Type',v:dsoTypeLabel(type)},{l:'Magnitude',v:vmag.toFixed(1)},{l:'Size',v:sz+'°'},{l:'Altitude',v:obj.data.pos.alt.toFixed(1)+'°'}];
  } else if(obj.type==='planet'){
    const p=obj.data.planet;
    type_l='PLANET · SOLAR SYSTEM';name=p.name;
    sub=`Currently at ${obj.data.pos.alt.toFixed(1)}° altitude`;desc=p.desc;
    stats=[{l:'Altitude',v:obj.data.pos.alt.toFixed(1)+'°'},{l:'Azimuth',v:obj.data.pos.az.toFixed(0)+'°'},{l:'Type',v:'Solar System Planet'}];
  } else {
    const ph=obj.data.phase;
    type_l='NATURAL SATELLITE · EARTH';name='The Moon';
    sub=phaseName(ph)+' · '+Math.round(Math.abs(Math.cos(ph*Math.PI*2))*100)+'% illuminated';
    desc='Our nearest celestial neighbour at 384,400 km. The Moon\'s gravity creates our ocean tides and has stabilized Earth\'s axial tilt, making complex life possible.';
    stats=[{l:'Phase',v:phaseName(ph)},{l:'Illumination',v:Math.round(Math.abs(Math.cos(ph*Math.PI*2))*100)+'%'},{l:'Distance',v:'~384,400 km'}];
  }

  document.getElementById('ip-t').textContent=type_l;
  document.getElementById('ip-n').textContent=name;
  document.getElementById('ip-s').textContent=sub;
  document.getElementById('ip-d').textContent=desc;
  document.getElementById('ip-st').innerHTML=stats.map(s=>`<div class="isc"><div class="isl">${s.l}</div><div class="isv">${s.v}</div></div>`).join('');
  document.getElementById('info').classList.add('show');

  rn('OBJECT_IDENTIFIED',{name,type:obj.type==='dso'?obj.data.dso[3]:obj.type,constellation:obj.type==='star'?obj.data.star[5]:(obj.type==='dso'?obj.data.dso[7]:''),description:desc});
}

function closeInfo(){document.getElementById('info').classList.remove('show');selectedObj=null;}

function spectralType(bv){
  if(bv<-0.3)return'O-type (blue)';
  if(bv<0)return'B-type (blue-white)';
  if(bv<0.3)return'A-type (white)';
  if(bv<0.58)return'F-type (yellow-white)';
  if(bv<1.0)return'G-type (yellow)';
  if(bv<1.5)return'K-type (orange)';
  return'M-type (red)';
}

function dsoTypeLabel(t){
  return{galaxy:'Galaxy',nebula:'Emission Nebula',remnant:'Supernova Remnant',planetary_neb:'Planetary Nebula',dark_nebula:'Dark Nebula',cluster_open:'Open Cluster',cluster_glob:'Globular Cluster'}[t]||t;
}

// ── RN BRIDGE ────────────────────────────────────────
function rn(ev,data){
  try{if(window.ReactNativeWebView)window.ReactNativeWebView.postMessage(JSON.stringify({event:ev,data}));}catch(e){}
}

window.addEventListener('message',onMsg);document.addEventListener('message',onMsg);
function onMsg(e){
  try{
    const m=JSON.parse(e.data);
    if(m.type==='LOCATION'){LAT=m.lat;LON=m.lon;}
    if(m.type==='COMPASS'&&arMode){vAz=m.azimuth;vAlt=Math.max(-10,Math.min(88,m.altitude));}
    if(m.type==='AR_MODE'){arMode=m.enabled;document.getElementById('bAR').classList.toggle('on',arMode);document.getElementById('ar-bar').classList.toggle('show',arMode);}
  }catch(e){}
}

// ── BUTTONS ──────────────────────────────────────────
document.getElementById('ic').onclick=closeInfo;
document.getElementById('bClose').onclick=closeInfo;

document.getElementById('bAtlas').onclick=()=>{
  if(!selectedObj) return;
  let name=document.getElementById('ip-n').textContent;
  let type=selectedObj.type==='dso'?selectedObj.data.dso[3]:selectedObj.type;
  let desc=document.getElementById('ip-d').textContent;
  let con=selectedObj.type==='star'?selectedObj.data.star[5]:(selectedObj.type==='dso'?selectedObj.data.dso[7]:'');
  rn('ADD_TO_ATLAS',{name,type,constellation:con,description:desc,method:'skymap'});
  const b=document.getElementById('bAtlas');
  b.textContent='✓ Added!';b.style.background='#4dff91';
  setTimeout(()=>{b.textContent='+ Add to Atlas';b.style.background='';},2000);
};

document.getElementById('bL').onclick=()=>{
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(p=>{
      LAT=p.coords.latitude;LON=p.coords.longitude;
      rn('LOCATION_SET',{lat:LAT,lon:LON});
    });
  }
};

document.getElementById('bT').onclick=()=>{
  const items=[];
  DSOS.forEach(d=>{
    const pos=toAltAz(d[1],d[2]);
    if(pos.alt>15&&d[4]<9) items.push({name:d[0],type:dsoTypeLabel(d[3]),alt:pos.alt,az:pos.az});
  });
  PLANETS.forEach(p=>{
    const c=planetPos(p);
    const pos=toAltAz(c.ra,c.dec);
    if(pos.alt>10) items.push({name:p.name,type:'Planet',alt:pos.alt});
  });
  items.sort((a,b)=>b.alt-a.alt);
  alert('TONIGHT:\n'+items.slice(0,8).map(i=>`${i.name} (${i.type}) — ${i.alt.toFixed(0)}° alt`).join('\n'));
};

document.getElementById('bAR').onclick=()=>{
  arMode=!arMode;
  document.getElementById('bAR').classList.toggle('on',arMode);
  document.getElementById('ar-bar').classList.toggle('show',arMode);
  rn('AR_TOGGLE',{enabled:arMode});
};

document.getElementById('bZI').onclick=()=>{zoom=Math.min(6,zoom*1.3);};
document.getElementById('bZO').onclick=()=>{zoom=Math.max(0.3,zoom/1.3);};

// ── RESIZE ───────────────────────────────────────────
window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  renderer.setSize(W,H);
  camera.left=-W/2;camera.right=W/2;camera.top=H/2;camera.bottom=-H/2;
  camera.updateProjectionMatrix();
});

// ── INIT ─────────────────────────────────────────────
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(p=>{
    LAT=p.coords.latitude;LON=p.coords.longitude;
    rn('LOCATION_SET',{lat:LAT,lon:LON});
  },()=>{});
}

if(typeof THREE!=='undefined'){
  initThree();
} else {
  document.getElementById('lt').textContent='Error: Three.js failed to load';
}

rn('MAP_READY',{version:'5.0-webgl'});
</script>
</body>
</html>
