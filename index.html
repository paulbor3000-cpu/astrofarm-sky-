.in{color:#fff;font-size:22px;font-weight:700;margin-bottom:3px}
.is{color:rgba(255,255,255,0.45);font-size:13px;margin-bottom:12px}

setTimeout(()=>hideLoading(),8000);

function hideLoading(){
  const l=document.getElementById('load');
  l.classList.add('hide');
  setTimeout(()=>{l.style.display='none';},800);
}

function setLoadText(t){document.getElementById('lt').textContent=t;}

// ── RN BRIDGE
function rn(ev,data){
  try{if(window.ReactNativeWebView)window.ReactNativeWebView.postMessage(JSON.stringify({event:ev,data}));}catch(e){}
}
window.addEventListener('message',onMsg);
document.addEventListener('message',onMsg);

let LAT=37.7,LON=-2.1,arMode=false,selectedObj=null;

function onMsg(e){
  try{
    const m=JSON.parse(e.data);
    if(m.type==='LOCATION'){LAT=m.lat;LON=m.lon;needsUpdate=true;}
    if(m.type==='COMPASS'&&arMode){vAz=m.azimuth;vAlt=Math.max(-10,Math.min(88,m.altitude));needsUpdate=true;}
    if(m.type==='AR_MODE'){arMode=m.enabled;document.getElementById('bAR').classList.toggle('on',arMode);document.getElementById('ar-bar').classList.toggle('show',arMode);}
  }catch(e){}
}

// ── ASTRONOMY
const D2R=Math.PI/180,R2D=180/Math.PI;
function jd(){return Date.now()/86400000+2440587.5}
function gmst(j){return((280.46061837+360.98564736629*(j-2451545))%360+360)%360}
function lst(j,lon){return((gmst(j)+lon)%360+360)%360}

function toAltAz(ra_h,dec_d){
  const j=jd(),ha=lst(j,LON)-ra_h*15;
  const haR=ha*D2R,decR=dec_d*D2R,latR=LAT*D2R;
  const sinA=Math.sin(decR)*Math.sin(latR)+Math.cos(decR)*Math.cos(latR)*Math.cos(haR);
  const alt=Math.asin(Math.max(-1,Math.min(1,sinA)))*R2D;
  const cosAz=(Math.sin(decR)-Math.sin(latR)*sinA)/(Math.cos(latR)*Math.cos(alt*D2R));
  let az=Math.acos(Math.max(-1,Math.min(1,cosAz)))*R2D;
  if(Math.sin(haR)>0)az=360-az;
  return{alt,az};
}

function bvToHex(bv){
  if(bv<-0.25)return'#ccdeff';
  if(bv<0.0)return'#ddeeff';
  if(bv<0.3)return'#ffffff';
  if(bv<0.58)return'#fffde0';
  if(bv<1.0)return'#ffe4a0';
  if(bv<1.5)return'#ffb84d';
  return'#ff8833';
}

function planetPos(p){
  const j=jd();
  const M=((p.ml-p.lp)+360/p.T*(j-2451545))%360;
  const Mr=M*D2R,C=(2*p.e-p.e**3/4)*Math.sin(Mr)+(5/4*p.e**2)*Math.sin(2*Mr);
  const nu=M+C*R2D,lEcl=(nu+p.lp)%360;
  const eps=23.439,lR=lEcl*D2R,eR=eps*D2R;
  const ra_r=Math.atan2(Math.sin(lR)*Math.cos(eR),Math.cos(lR));
  const dec_r=Math.asin(Math.sin(eR)*Math.sin(lR));
  return{ra:((ra_r*R2D%360+360)%360)/15,dec:dec_r*R2D};
}

function moonPhase(){
  const j=jd(),k=new Date(2000,0,6).getTime()/86400000+2440587.5;
  return((j-k)%29.53058867)/29.53058867;
}

// ── THREEJS SETUP
let renderer,scene,camera,W,H;
let vAz=180,vAlt=45,zoom=1;
let needsUpdate=true;
let starMeshes=[],dsoMeshes=[],planetMeshes=[];

function init(){
  try{
    W=window.innerWidth;H=window.innerHeight;
    renderer=new THREE.WebGLRenderer({
      canvas:document.getElementById('c'),
      antialias:false,
      powerPreference:'low-power',
      alpha:false
    });
    renderer.setPixelRatio(1); // use 1 for performance on mobile
    renderer.setSize(W,H);
    renderer.setClearColor(0x000000);

    scene=new THREE.Scene();
    camera=new THREE.OrthographicCamera(-W/2,W/2,H/2,-H/2,0.1,100);
    camera.position.z=10;

    setLoadText('Building star field...');
    buildStars();
    setLoadText('Adding deep sky objects...');
    buildDSOs();
    setLoadText('Calculating planets...');
    buildPlanets();
    buildMilkyWay();

    setLoadText('Rendering...');
    render();
    hideLoading();

    rn('MAP_READY',{version:'5.0'});
  }catch(err){
    console.error('Init error:',err);
    setLoadText('Error: '+err.message);
    setTimeout(hideLoading,2000);
  }
}

function project(alt,az){
  const dAz=((az-vAz+540)%360)-180;
  const dAlt=alt-vAlt;
  const sc=Math.min(W,H)*0.45/(90/zoom);
  return{x:dAz*sc,y:dAlt*sc,visible:alt>-8&&Math.abs(dAz)<100&&Math.abs(dAlt)<80};
}

// Build stars using simple PointsMaterial (no custom shader = more compatible)
function buildStars(){
  // Background stars
  const BG=2000;
  const bgPos=new Float32Array(BG*3);
  const bgCol=new Float32Array(BG*3);
  for(let i=0;i<BG;i++){
    bgPos[i*3]=i*0.1;bgPos[i*3+1]=i*0.07;bgPos[i*3+2]=0;
    const b=0.08+Math.sin(i*0.37)*0.12;
    bgCol[i*3]=b;bgCol[i*3+1]=b;bgCol[i*3+2]=b*1.05;
  }
  const bgGeo=new THREE.BufferGeometry();
  bgGeo.setAttribute('position',new THREE.BufferAttribute(bgPos,3));
  bgGeo.setAttribute('color',new THREE.BufferAttribute(bgCol,3));
  const bgMat=new THREE.PointsMaterial({size:1,vertexColors:true,sizeAttenuation:false});
  const bgPoints=new THREE.Points(bgGeo,bgMat);
  bgPoints.userData={type:'bg'};
  scene.add(bgPoints);
  starMeshes.push({obj:bgPoints,type:'bg'});

  // Named stars — use sprites for nice circular look
  STARS.forEach((s,i)=>{
    const [nm,ra,dec,vmag,bv,con]=s;
    const sz=Math.max(2,Math.min(14,(6-vmag)*1.8));
    const canvas2=document.createElement('canvas');
    const cs=Math.ceil(sz*4);
    canvas2.width=cs;canvas2.height=cs;
    const ctx=canvas2.getContext('2d');
    const col=bvToHex(bv);
    const g=ctx.createRadialGradient(cs/2,cs/2,0,cs/2,cs/2,cs/2);
    g.addColorStop(0,col);g.addColorStop(0.5,col+'aa');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,cs,cs);
    const tex=new THREE.CanvasTexture(canvas2);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
    const sprite=new THREE.Sprite(mat);
    sprite.scale.set(sz*1.5,sz*1.5,1);
    sprite.userData={type:'star',star:s};
    scene.add(sprite);
    starMeshes.push({obj:sprite,type:'star',star:s,ra,dec,vmag,sz});
  });
}

function buildMilkyWay(){
  const N=1500;
  const pos=new Float32Array(N*3);
  const col=new Float32Array(N*3);
  // MW band waypoints [ra_h, dec_d]
  const MW=[[6,-50],[8,-10],[10,10],[13,50],[16,65],[18,30],[18.5,-10],[19,-30],[21,-50],[23,-55],[1,-45],[3,-44],[5,-48]];
  for(let i=0;i<N;i++){
    const t=(i/N)*MW.length;
    const i0=Math.floor(t)%MW.length;
    const i1=(i0+1)%MW.length;
    const f=t-Math.floor(t);
    const ra=MW[i0][0]+(MW[i1][0]-MW[i0][0])*f+(Math.sin(i*17.3)-0.5)*1.2;
    const dec=MW[i0][1]+(MW[i1][1]-MW[i0][1])*f+(Math.sin(i*23.7)-0.5)*10;
    pos[i*3]=ra;pos[i*3+1]=dec;pos[i*3+2]=0;
    const b=0.06+Math.abs(Math.sin(i*0.13))*0.12;
    col[i*3]=b*0.85;col[i*3+1]=b*0.9;col[i*3+2]=b;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat=new THREE.PointsMaterial({size:1.5,vertexColors:true,sizeAttenuation:false,transparent:true,opacity:0.6});
  const pts=new THREE.Points(geo,mat);
  pts.userData={type:'mw'};
  scene.add(pts);
  starMeshes.push({obj:pts,type:'mw'});
}

function buildDSOs(){
  DSOS.forEach(d=>{
    const [nm,ra,dec,type,vmag,desc,con,id]=d;
    // DSO icon as canvas sprite
    const canvas2=document.createElement('canvas');canvas2.width=32;canvas2.height=32;
    const ctx=canvas2.getContext('2d');
    const col=type==='galaxy'?'#ffaa44':type==='globular'?'#ffcc88':type==='cluster'?'#ffff88':type==='planetary'?'#44ffaa':type==='remnant'?'#ff6666':'#44aaff';
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=0.8;
    const cx=16,cy=16,r=10;
    if(type==='galaxy'){
      ctx.beginPath();ctx.ellipse(cx,cy,r,r*0.55,0.4,0,Math.PI*2);ctx.stroke();
    }else if(type==='cluster'){
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.setLineDash([4,3]);ctx.stroke();
    }else if(type==='globular'){
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx-r,cy);ctx.lineTo(cx+r,cy);ctx.moveTo(cx,cy-r);ctx.lineTo(cx,cy+r);ctx.globalAlpha=0.4;ctx.stroke();
    }else if(type==='planetary'){
      ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.globalAlpha=0.3;ctx.stroke();
    }else{
      ctx.strokeRect(cx-r,cy-r,r*2,r*2);
    }
    const tex=new THREE.CanvasTexture(canvas2);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
    const sprite=new THREE.Sprite(mat);
    const sz=Math.max(12,Math.min(28,(9-vmag)*2));
    sprite.scale.set(sz,sz,1);
    sprite.userData={type:'dso',dso:d};
    scene.add(sprite);
    dsoMeshes.push({obj:sprite,dso:d,ra,dec,vmag,sz});
  });
}

function buildPlanets(){
  PLANETS.forEach(p=>{
    const canvas2=document.createElement('canvas');canvas2.width=32;canvas2.height=32;
    const ctx=canvas2.getContext('2d');
    const g=ctx.createRadialGradient(16,16,0,16,16,12);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.4,p.col);g.addColorStop(1,p.col+'44');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(16,16,12,0,Math.PI*2);ctx.fill();
    const tex=new THREE.CanvasTexture(canvas2);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
    const sprite=new THREE.Sprite(mat);
    const sz=p.r*2.5;
    sprite.scale.set(sz,sz,1);
    sprite.userData={type:'planet',planet:p};
    scene.add(sprite);
    planetMeshes.push({obj:sprite,planet:p,sz});
  });
}

// Hit test data
let tapTargets=[];

function updatePositions(){
  tapTargets=[];

  // Named stars
  starMeshes.filter(s=>s.type==='star').forEach(sm=>{
    const pos=toAltAz(sm.ra,sm.dec);
    const sp=project(pos.alt,pos.az);
    if(sp.visible){
      sm.obj.position.set(sp.x,sp.y,0);
      sm.obj.visible=true;
      tapTargets.push({x:sp.x,y:sp.y,r:Math.max(sm.sz,16),data:{type:'star',star:sm.star,pos}});
    }else{
      sm.obj.position.set(99999,0,0);
      sm.obj.visible=false;
    }
  });

  // Background stars & MW
  starMeshes.filter(s=>s.type==='bg'||s.type==='mw').forEach(sm=>{
    const posArr=sm.obj.geometry.attributes.position;
    const N=posArr.count;
    for(let i=0;i<N;i++){
      let ra,dec;
      if(sm.type==='mw'){
        ra=posArr.getX(i);dec=posArr.getY(i);
      }else{
        ra=(Math.sin(i*127.1)*0.5+0.5)*24;
        dec=(Math.sin(i*311.7)*0.5+0.5)*170-85;
      }
      const p=toAltAz(ra,dec);
      const sp=project(p.alt,p.az);
      if(sp.visible){posArr.setXYZ(i,sp.x,sp.y,0);}
      else{posArr.setXYZ(i,99999,0,0);}
    }
    posArr.needsUpdate=true;
  });

  // DSOs
  dsoMeshes.forEach(dm=>{
    const pos=toAltAz(dm.ra,dm.dec);
    const sp=project(pos.alt,pos.az);
    if(sp.visible&&dm.vmag<9.5){
      dm.obj.position.set(sp.x,sp.y,0);
      dm.obj.visible=true;
      tapTargets.push({x:sp.x,y:sp.y,r:Math.max(dm.sz,20),data:{type:'dso',dso:dm.dso,pos}});
    }else{
      dm.obj.position.set(99999,0,0);
      dm.obj.visible=false;
    }
  });

  // Planets
  planetMeshes.forEach(pm=>{
    const coords=planetPos(pm.planet);
    const pos=toAltAz(coords.ra,coords.dec);
    const sp=project(pos.alt,pos.az);
    if(sp.visible){
      pm.obj.position.set(sp.x,sp.y,0);
      pm.obj.visible=true;
      tapTargets.push({x:sp.x,y:sp.y,r:30,data:{type:'planet',planet:pm.planet,pos}});
    }else{
      pm.obj.position.set(99999,0,0);
      pm.obj.visible=false;
    }
  });

  // Moon
  updateMoon();

  // Horizon glow
  updateHorizon();

  // Time
  const n=new Date();
  document.getElementById('td').textContent=
    `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')} · ${LAT.toFixed(1)}°${LAT>=0?'N':'S'}`;
}

let moonSprite=null;
function updateMoon(){
  if(!moonSprite){
    const canvas2=document.createElement('canvas');canvas2.width=48;canvas2.height=48;
    const ctx=canvas2.getContext('2d');
    ctx.fillStyle='#e8e0d0';ctx.beginPath();ctx.arc(24,24,20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.6)';
    const ph=moonPhase();
    ctx.save();ctx.beginPath();ctx.arc(24,24,20,0,Math.PI*2);ctx.clip();
    ctx.beginPath();ctx.arc(24+20*Math.cos(ph*Math.PI*2),24,20,0,Math.PI*2);ctx.fill();
    ctx.restore();
    const tex=new THREE.CanvasTexture(canvas2);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
    moonSprite=new THREE.Sprite(mat);
    moonSprite.scale.set(30,30,1);
    scene.add(moonSprite);
  }
  // approximate moon position
  const j=jd();
  const L=(218.316+13.176396*(j-2451545))%360;
  const M=(134.963+13.064993*(j-2451545))%360*D2R;
  const lo=L+6.289*Math.sin(M);
  const ra=((lo%360+360)%360)/15;
  const pos=toAltAz(ra,0);
  const sp=project(pos.alt,pos.az);
  if(sp.visible){moonSprite.position.set(sp.x,sp.y,1);moonSprite.visible=true;tapTargets.push({x:sp.x,y:sp.y,r:30,data:{type:'moon'}});}
  else{moonSprite.visible=false;}
}

let horizonMesh=null;
function updateHorizon(){
  if(!horizonMesh){
    const geo=new THREE.PlaneGeometry(10000,10000);
    const mat=new THREE.MeshBasicMaterial({color:0x050f0a,transparent:true,opacity:0.5});
    horizonMesh=new THREE.Mesh(geo,mat);
    scene.add(horizonMesh);
  }
  const sc=Math.min(W,H)*0.45/(90/zoom);
  horizonMesh.position.set(0,-vAlt*sc-5000,0);
}

let frame=0;
function render(){
  requestAnimationFrame(render);
  frame++;
  if(frame%4===0||needsUpdate){
    updatePositions();
    needsUpdate=false;
  }
  renderer.render(scene,camera);
}

// ── TAP HANDLING
let panning=false,lx=0,ly=0,tsx=0,tsy=0,ts=0,moved=false,pinch=0;
const cv=document.getElementById('c');

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    panning=true;moved=false;
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;
    tsx=lx;tsy=ly;ts=Date.now();
  }else if(e.touches.length===2){
    panning=false;
    pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&panning&&!arMode){
    const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;
    if(Math.abs(dx)+Math.abs(dy)>2)moved=true;
    const sc=(90/zoom)/(Math.min(W,H)*0.45);
    vAz=(vAz-dx*sc+360)%360;
    vAlt=Math.max(-10,Math.min(88,vAlt+dy*sc));
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;
    needsUpdate=true;
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinch>0){zoom=Math.max(0.3,Math.min(8,zoom*(d/pinch)));needsUpdate=true;}
    pinch=d;moved=true;
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!moved&&e.changedTouches.length===1&&Date.now()-ts<300){
    const cx=e.changedTouches[0].clientX-W/2;
    const cy=-(e.changedTouches[0].clientY-H/2);
    handleTap(cx,cy);
  }
  panning=false;
},{passive:false});

function handleTap(x,y){
  let best=null,bd=50;
  tapTargets.forEach(t=>{
    const d=Math.hypot(t.x-x,t.y-y);
    if(d<t.r&&d<bd){bd=d;best=t;}
  });
  if(best)showInfo(best.data);
  else closeInfo();
}

// ── INFO PANEL
const STAR_DESC={
'Sirius':'The brightest star in the sky at 8.6 light-years away. Blue-white, twice as hot as our Sun.',
'Betelgeuse':'A red supergiant 700 light-years away. Expected to explode as a supernova within 100,000 years.',
'Rigel':'A blue supergiant 860 light-years away, 120,000× more luminous than our Sun.',
'Vega':'25 light-years away, part of the Summer Triangle. Will be the North Star in 13,727 years.',
'Arcturus':'The brightest northern star, 37 light-years away. A red giant 25× larger than the Sun.',
'Capella':'Actually four stars in two binary pairs, 43 light-years away.',
'Procyon':'Just 11.46 light-years away — the 7th nearest star system to Earth.',
'Altair':'Spinning so fast it is visibly flattened at its poles. 17 light-years away.',
'Aldebaran':'The fiery eye of Taurus, a red giant 65 light-years away.',
'Spica':'Two massive stars orbiting so close they are pulled into egg-shapes, 250 light-years away.',
'Antares':'A red supergiant so vast it would engulf Mars if placed at our Sun.',
'Deneb':'One of the most luminous stars known — 200,000× the Sun\'s output from 2,600 light-years.',
'Polaris':'The North Star, within 1° of the celestial pole. Has guided navigators for millennia.',
'Regulus':'Spinning so fast it loses mass from its equator.',
'Fomalhaut':'A young star with a debris disk — direct evidence of planet formation, 25 light-years away.',
};

function showInfo(data){
  selectedObj=data;
  let type_l='',name='',sub='',desc='',stats=[];

  if(data.type==='star'){
    const [nm,ra,dec,vmag,bv,con]=data.star;
    type_l='STAR · '+con;name=nm;
    sub=`Magnitude ${vmag} · ${con}`;
    desc=STAR_DESC[nm]||`A star of magnitude ${vmag} in ${con}.`;
    stats=[{l:'Magnitude',v:vmag.toFixed(2)},{l:'Altitude',v:data.pos.alt.toFixed(1)+'°'},{l:'Azimuth',v:data.pos.az.toFixed(0)+'°'},{l:'B-V Index',v:bv.toFixed(2)}];
  }else if(data.type==='dso'){
    const [nm,ra,dec,type,vmag,d_desc,con,id]=data.dso;
    const tl={galaxy:'GALAXY',globular:'GLOBULAR CLUSTER',cluster:'OPEN CLUSTER',nebula:'NEBULA',planetary:'PLANETARY NEBULA',remnant:'SUPERNOVA REMNANT'};
    type_l=(tl[type]||'DEEP SKY OBJECT')+' · '+con;
    name=nm;sub=(id?id+' · ':'')+`Magnitude ${vmag}`;desc=d_desc;
    stats=[{l:'Type',v:tl[type]||type},{l:'Magnitude',v:vmag.toFixed(1)},{l:'Altitude',v:data.pos.alt.toFixed(1)+'°'},{l:'Constellation',v:con}];
  }else if(data.type==='planet'){
    const p=data.planet;
    type_l='PLANET · SOLAR SYSTEM';name=p.n;
    sub='Currently at '+data.pos.alt.toFixed(1)+'° altitude';
    desc=p.d;
    stats=[{l:'Altitude',v:data.pos.alt.toFixed(1)+'°'},{l:'Azimuth',v:data.pos.az.toFixed(0)+'°'}];
  }else{
    const ph=moonPhase();
    const ill=Math.round(Math.abs(Math.cos(ph*Math.PI*2))*100);
    const pn=['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
    const pi=Math.round(ph*8)%8;
    type_l='NATURAL SATELLITE · EARTH';name='The Moon';
    sub=pn[pi]+' · '+ill+'% illuminated';
    desc='Our nearest neighbour at 384,400 km. The Moon\'s gravity creates tides and has stabilized Earth\'s axial tilt for billions of years.';
    stats=[{l:'Phase',v:pn[pi]},{l:'Illumination',v:ill+'%'},{l:'Distance',v:'~384,400 km'}];
  }

  document.getElementById('ip-t').textContent=type_l;
  document.getElementById('ip-n').textContent=name;
  document.getElementById('ip-s').textContent=sub;
  document.getElementById('ip-d').textContent=desc;
  document.getElementById('ip-st').innerHTML=stats.map(s=>`<div class="isc"><div class="isl">${s.l}</div><div class="isv">${s.v}</div></div>`).join('');
  document.getElementById('info').classList.add('show');
  rn('OBJECT_IDENTIFIED',{name,type:data.type,description:desc});
}

function closeInfo(){document.getElementById('info').classList.remove('show');selectedObj=null;}

document.getElementById('ic').onclick=closeInfo;
document.getElementById('bClose').onclick=closeInfo;

document.getElementById('bAtlas').onclick=()=>{
  if(!selectedObj)return;
  const name=document.getElementById('ip-n').textContent;
  const desc=document.getElementById('ip-d').textContent;
  const con=selectedObj.type==='star'?selectedObj.star[5]:(selectedObj.type==='dso'?selectedObj.dso[6]:'');
  rn('ADD_TO_ATLAS',{name,type:selectedObj.type,constellation:con,description:desc,method:'skymap'});
  const b=document.getElementById('bAtlas');
  b.textContent='✓ Added!';b.style.background='#4dff91';
  setTimeout(()=>{b.textContent='+ Add to Atlas';b.style.background='';},2000);
};

document.getElementById('bL').onclick=()=>{
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{LAT=p.coords.latitude;LON=p.coords.longitude;needsUpdate=true;});
};

document.getElementById('bAR').onclick=()=>{
  arMode=!arMode;
  document.getElementById('bAR').classList.toggle('on',arMode);
  document.getElementById('ar-bar').classList.toggle('show',arMode);
  rn('AR_TOGGLE',{enabled:arMode});
};

document.getElementById('bT').onclick=()=>{
  const items=[];
  DSOS.forEach(d=>{const p=toAltAz(d[1],d[2]);if(p.alt>15&&d[4]<9)items.push({n:d[0],alt:p.alt});});
  PLANETS.forEach(p=>{const c=planetPos(p);const pos=toAltAz(c.ra,c.dec);if(pos.alt>10)items.push({n:p.n,alt:pos.alt});});
  items.sort((a,b)=>b.alt-a.alt);
  alert('TONIGHT:\n'+items.slice(0,8).map(i=>`${i.n} — ${i.alt.toFixed(0)}° altitude`).join('\n'));
};

document.getElementById('bZI').onclick=()=>{zoom=Math.min(8,zoom*1.3);needsUpdate=true;};
document.getElementById('bZO').onclick=()=>{zoom=Math.max(0.3,zoom/1.3);needsUpdate=true;};

window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  renderer.setSize(W,H);
  camera.left=-W/2;camera.right=W/2;camera.top=H/2;camera.bottom=-H/2;
  camera.updateProjectionMatrix();
  needsUpdate=true;
});

if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{LAT=p.coords.latitude;LON=p.coords.longitude;},{});

// Start
if(typeof THREE!=='undefined'){
  setTimeout(init,100);
}else{
  setLoadText('Error: 3D library failed to load. Check connection.');
}
