<title>Astrofarm Sky</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%}
#hd{position:fixed;top:0;left:0;right:0;padding:48px 16px 12px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(rgba(0,0,0,.7),transparent);z-index:10;pointer-events:none}
.logo{color:#fff;font-size:13px;font-weight:700;letter-spacing:3px}
.logo span{color:#4dff91}
#td{color:rgba(255,255,255,.45);font-size:11px}
#ctrl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.btn{background:rgba(0,0,0,.75);border:1px solid rgba(77,255,145,.35);color:#fff;padding:9px 18px;border-radius:50px;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn.on{background:rgba(77,255,145,.15);border-color:#4dff91;color:#4dff91}
#zc{position:fixed;right:16px;bottom:80px;display:flex;flex-direction:column;gap:8px;z-index:10}
.zb{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#info{position:fixed;bottom:0;left:0;right:0;background:rgba(5,15,10,.97);border-top:1px solid rgba(77,255,145,.2);padding:20px 20px 40px;z-index:20;transform:translateY(100%);transition:transform .3s;max-height:60vh;overflow-y:auto}
#info.show{transform:translateY(0)}
#ic{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#fff;font-size:14px;cursor:pointer}
.it{color:#4dff91;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.in{color:#fff;font-size:22px;font-weight:700;margin-bottom:3px}
.is{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:12px}
.id{color:rgba(255,255,255,.8);font-size:14px;line-height:1.65;margin-bottom:16px}
.ist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.isc{background:rgba(77,255,145,.06);border:1px solid rgba(77,255,145,.1);border-radius:10px;padding:9px 11px}
.isl{color:rgba(255,255,255,.35);font-size:9px;letter-spacing:1px;text-transform:uppercase}
.isv{color:#fff;font-size:14px;font-weight:600;margin-top:1px}
.ia{display:flex;gap:8px}
.iab{flex:1;padding:12px;border-radius:12px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.iab.p{background:#4dff91;color:#000}
.iab.s{background:rgba(77,255,145,.1);color:#4dff91;border:1px solid rgba(77,255,145,.3)}
#arbar{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(77,255,145,.12);border:1px solid rgba(77,255,145,.35);color:#4dff91;padding:6px 16px;border-radius:20px;font-size:11px;display:none;z-index:10}
#arbar.show{display:block}

// ── RN BRIDGE
function rn(ev,data){try{if(window.ReactNativeWebView)window.ReactNativeWebView.postMessage(JSON.stringify({event:ev,data}));}catch(e){}}
window.addEventListener('message',onMsg);document.addEventListener('message',onMsg);

let LAT=37.7,LON=-2.1,arMode=false,sel=null;
let vAz=180,vAlt=40,zoom=1.8;

function onMsg(e){
  try{
    const m=JSON.parse(e.data);
    if(m.type==='LOCATION'){LAT=m.lat;LON=m.lon;draw();}
    if(m.type==='COMPASS'&&arMode){vAz=m.azimuth;vAlt=Math.max(-10,Math.min(88,m.altitude));draw();}
  }catch(e){}
}

// ── ASTRONOMY
const D2R=Math.PI/180,R2D=180/Math.PI;
function jd(){return Date.now()/86400000+2440587.5}
function gmst(j){return((280.46061837+360.98564736629*(j-2451545))%360+360)%360}

function toAltAz(ra_h,dec_d){
  const j=jd(),ha=((gmst(j)+LON)-ra_h*15+720)%360;
  const haR=ha*D2R,decR=dec_d*D2R,latR=LAT*D2R;
  const sinA=Math.sin(decR)*Math.sin(latR)+Math.cos(decR)*Math.cos(latR)*Math.cos(haR);
  const alt=Math.asin(Math.max(-1,Math.min(1,sinA)))*R2D;
  const cosAz=(Math.sin(decR)-Math.sin(latR)*sinA)/(Math.cos(latR)*Math.cos(Math.max(0.001,Math.abs(alt))*D2R));
  let az=Math.acos(Math.max(-1,Math.min(1,cosAz)))*R2D;
  if(Math.sin(haR)>0)az=360-az;
  return{alt,az};
}

function project(alt,az){
  const dAz=((az-vAz+540)%360)-180;
  const dAlt=alt-vAlt;
  const sc=Math.min(W,H)*0.46/(90/zoom);
  return{x:W/2-dAz*sc,y:H/2-dAlt*sc,vis:alt>-5&&Math.abs(dAz)<95&&Math.abs(dAlt)<75};
}

function bvToColor(bv){
  if(bv<-0.25)return'#ccdeff';
  if(bv<0)return'#ddeeff';
  if(bv<0.3)return'#ffffff';
  if(bv<0.58)return'#fffde0';
  if(bv<1.0)return'#ffe4a0';
  if(bv<1.5)return'#ffb84d';
  return'#ff8833';
}

function planetPos(p){
  const j=jd(),M=((p.ml-p.lp)+360/p.T*(j-2451545))%360;
  const Mr=M*D2R,C=(2*p.e-p.e**3/4)*Math.sin(Mr)+(5/4*p.e**2)*Math.sin(2*Mr);
  const nu=M+C*R2D,lEcl=(nu+p.lp)%360,eps=23.439,lR=lEcl*D2R,eR=eps*D2R;
  const ra_r=Math.atan2(Math.sin(lR)*Math.cos(eR),Math.cos(lR));
  const dec_r=Math.asin(Math.sin(eR)*Math.sin(lR));
  return{ra:((ra_r*R2D%360+360)%360)/15,dec:dec_r*R2D};
}

function moonData(){
  const j=jd(),L=(218.316+13.176396*(j-2451545))%360;
  const M=(134.963+13.064993*(j-2451545))%360*D2R;
  const lo=L+6.289*Math.sin(M),ra=((lo%360+360)%360)/15,dec=5.128*Math.sin((93.272+13.22935*(j-2451545))%360*D2R);
  const sM=(357.529+.9856*(j-2451545))%360*D2R;
  const sLon=280.459+.985647*(j-2451545)+1.915*Math.sin(sM);
  const phase=((lo-sLon)%360+360)%360;
  const ill=Math.round((1-Math.cos(phase*D2R))/2*100);
  return{ra,dec,phase,ill};
}

// ── PRE-GENERATE BACKGROUND STARS (stable random)
const BGSTARS=[];
for(let i=0;i<2200;i++){
  const ra=(Math.sin(i*127.1+1)*0.5+0.5)*24;
  const dec=(Math.sin(i*311.7+2)*0.5+0.5)*170-85;
  const mag=3.5+Math.abs(Math.sin(i*73.3))*3;
  BGSTARS.push([ra,dec,mag]);
}

// ── TAP TARGETS
let tapTargets=[];

// ── DRAW
let animFrame=null;
let lastDraw=0;

function draw(){
  if(animFrame)cancelAnimationFrame(animFrame);
  animFrame=requestAnimationFrame(_draw);
}

function _draw(){
  animFrame=null;
  tapTargets=[];
  ctx.clearRect(0,0,W,H);

  // Sky gradient
  const sky=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  sky.addColorStop(0,'#000810');sky.addColorStop(1,'#000000');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Horizon glow
  const sc=Math.min(W,H)*0.46/(90/zoom);
  const horizY=H/2+vAlt*sc;
  if(horizY<H+50){
    const hg=ctx.createLinearGradient(0,horizY-20,0,horizY+40);
    hg.addColorStop(0,'rgba(0,80,30,0)');hg.addColorStop(0.5,'rgba(0,80,30,0.12)');hg.addColorStop(1,'rgba(0,0,0,0.5)');
    ctx.fillStyle=hg;ctx.fillRect(0,horizY-20,W,H);
    ctx.strokeStyle='rgba(0,120,50,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,horizY);ctx.lineTo(W,horizY);ctx.stroke();

    // Compass points
    ['N','NE','E','SE','S','SW','W','NW'].forEach((d,i)=>{
      const az=i*45,dAz=((az-vAz+540)%360)-180;
      if(Math.abs(dAz)>92)return;
      const x=W/2+dAz*sc;
      ctx.fillStyle='rgba(77,255,145,0.6)';ctx.font='bold 10px -apple-system,sans-serif';
      ctx.textAlign='center';ctx.fillText(d,x,horizY-6);
    });
  }

  // Below horizon fill
  if(horizY<H){
    ctx.fillStyle='rgba(5,15,10,0.45)';
    ctx.fillRect(0,horizY,W,H-horizY);
  }

  // Milky Way
  ctx.save();
  const MW=[[6,-50],[8,-10],[10,10],[13,50],[16,65],[18,30],[18.5,-10],[19,-30],[21,-50],[23,-55],[1,-45],[3,-44],[5,-48]];
  for(let i=0;i<800;i++){
    const t=(i/800)*MW.length;
    const i0=Math.floor(t)%MW.length,i1=(i0+1)%MW.length,f=t-Math.floor(t);
    const ra=MW[i0][0]+(MW[i1][0]-MW[i0][0])*f+(Math.sin(i*17.3)-0.5)*1.1;
    const dec=MW[i0][1]+(MW[i1][1]-MW[i0][1])*f+(Math.sin(i*23.7)-0.5)*9;
    const p=toAltAz(ra,dec),sp=project(p.alt,p.az);
    if(!sp.vis)continue;
    const b=0.05+Math.abs(Math.sin(i*0.13))*0.1;
    ctx.fillStyle=`rgba(${Math.round(b*210)},${Math.round(b*220)},${Math.round(b*255)},${0.4+b})`;
    ctx.beginPath();ctx.arc(sp.x,sp.y,0.7,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Background stars
  BGSTARS.forEach(([ra,dec,mag])=>{
    const p=toAltAz(ra,dec),sp=project(p.alt,p.az);
    if(!sp.vis)return;
    const r=Math.max(0.4,Math.min(1.2,(5.5-mag)*0.4));
    const b=Math.min(1,(5-mag)/2.5);
    ctx.fillStyle=`rgba(255,255,255,${b*0.55})`;
    ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);ctx.fill();
  });

  // Constellation lines
  ctx.strokeStyle='rgba(60,100,220,0.18)';ctx.lineWidth=1;
  Object.values(CON_LINES).forEach(lines=>{
    lines.forEach(([n1,n2])=>{
      const s1=STAR_MAP[n1],s2=STAR_MAP[n2];if(!s1||!s2)return;
      const p1=toAltAz(s1[1],s1[2]),p2=toAltAz(s2[1],s2[2]);
      const sp1=project(p1.alt,p1.az),sp2=project(p2.alt,p2.az);
      if(!sp1.vis||!sp2.vis||p1.alt<-3||p2.alt<-3)return;
      ctx.beginPath();ctx.moveTo(sp1.x,sp1.y);ctx.lineTo(sp2.x,sp2.y);ctx.stroke();
    });
  });

  // Named stars
  STARS.forEach(s=>{
    const [nm,ra,dec,vmag,bv,con]=s;
    const p=toAltAz(ra,dec),sp=project(p.alt,p.az);
    if(!sp.vis)return;
    const r=Math.max(1.2,Math.min(8,(5.5-vmag)*1.5*Math.sqrt(zoom)));
    const col=bvToColor(bv);
    // Glow
    if(vmag<2){
      const g=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,r*3);
      g.addColorStop(0,col.replace('#','rgba(').replace(/(..)(..)(..)$/,(_,r2,g2,b2)=>`${parseInt(r2,16)},${parseInt(g2,16)},${parseInt(b2,16)},0.2)`)||'rgba(255,255,255,0.2)');
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(sp.x,sp.y,r*3,0,Math.PI*2);ctx.fill();
    }
    // Star disk
    const g2=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,r);
    g2.addColorStop(0,'#ffffff');g2.addColorStop(0.4,col);g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);ctx.fill();
    // Label
    if(vmag<2.5&&zoom>0.6){
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.font=`${Math.round(9*Math.min(zoom,1.5))}px -apple-system,sans-serif`;
      ctx.textAlign='left';ctx.fillText(nm,sp.x+r+3,sp.y+4);
    }
    const hitR=Math.max(r*2,18);
    tapTargets.push({x:sp.x,y:sp.y,r:hitR,d:{type:'star',s,pos:p}});
  });

  // DSOs
  DSOS.forEach(d=>{
    const [nm,ra,dec,type,vmag,desc,con,id]=d;
    const p=toAltAz(ra,dec),sp=project(p.alt,p.az);
    if(!sp.vis||vmag>9.5)return;
    const sz=Math.max(8,Math.min(22,(9-vmag)*2*Math.sqrt(zoom)));
    const cols={galaxy:'rgba(255,170,68,',globular:'rgba(255,200,130,',cluster:'rgba(255,255,130,',nebula:'rgba(68,170,255,',planetary:'rgba(68,255,170,',remnant:'rgba(255,100,100,'};
    const bc=cols[type]||'rgba(200,200,200,';
    ctx.strokeStyle=bc+'0.7)';ctx.lineWidth=1.2;
    if(type==='galaxy'){
      ctx.beginPath();ctx.ellipse(sp.x,sp.y,sz,sz*0.55,0.4,0,Math.PI*2);ctx.stroke();
    }else if(type==='globular'){
      ctx.beginPath();ctx.arc(sp.x,sp.y,sz,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.35;ctx.beginPath();ctx.moveTo(sp.x-sz,sp.y);ctx.lineTo(sp.x+sz,sp.y);ctx.moveTo(sp.x,sp.y-sz);ctx.lineTo(sp.x,sp.y+sz);ctx.stroke();ctx.globalAlpha=1;
    }else if(type==='cluster'){
      ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(sp.x,sp.y,sz,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }else if(type==='planetary'){
      ctx.beginPath();ctx.arc(sp.x,sp.y,sz*.45,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(sp.x,sp.y,sz*.8,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }else{
      ctx.setLineDash([3,3]);ctx.strokeRect(sp.x-sz*.7,sp.y-sz*.7,sz*1.4,sz*1.4);ctx.setLineDash([]);
    }
    if(vmag<7.5&&zoom>0.5){
      ctx.fillStyle=bc+'0.65)';
      ctx.font=`9px -apple-system,sans-serif`;ctx.textAlign='left';
      ctx.fillText(id||nm,sp.x+sz+3,sp.y+4);
    }
    tapTargets.push({x:sp.x,y:sp.y,r:Math.max(sz*1.5,20),d:{type:'dso',dso:d,pos:p}});
  });

  // Planets
  PLANETS.forEach(pl=>{
    const c=planetPos(pl),p=toAltAz(c.ra,c.dec),sp=project(p.alt,p.az);
    if(!sp.vis)return;
    const r=pl.r*Math.sqrt(zoom);
    // Glow
    const g=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,r*3);
    g.addColorStop(0,pl.col+'99');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sp.x,sp.y,r*3,0,Math.PI*2);ctx.fill();
    // Disk
    const g2=ctx.createRadialGradient(sp.x-r*.3,sp.y-r*.3,0,sp.x,sp.y,r);
    g2.addColorStop(0,'#ffffff');g2.addColorStop(0.5,pl.col);g2.addColorStop(1,pl.col+'88');
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font=`bold 10px -apple-system,sans-serif`;
    ctx.textAlign='left';ctx.fillText(pl.n,sp.x+r+3,sp.y+4);
    tapTargets.push({x:sp.x,y:sp.y,r:Math.max(r*2,24),d:{type:'planet',pl,pos:p}});
  });

  // Moon
  const mn=moonData(),mp=toAltAz(mn.ra,mn.dec),msp=project(mp.alt,mp.az);
  if(msp.vis){
    const mr=12*Math.sqrt(zoom);
    const mg=ctx.createRadialGradient(msp.x,msp.y,0,msp.x,msp.y,mr*3);
    mg.addColorStop(0,'rgba(255,255,220,0.15)');mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(msp.x,msp.y,mr*3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8e0d0';ctx.beginPath();ctx.arc(msp.x,msp.y,mr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0a0f';ctx.save();
    ctx.beginPath();ctx.arc(msp.x,msp.y,mr,0,Math.PI*2);ctx.clip();
    const ox=mr*Math.cos(mn.phase*D2R);
    ctx.beginPath();ctx.arc(msp.x+ox,msp.y,mr,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle='rgba(255,255,200,0.7)';ctx.font='10px -apple-system,sans-serif';
    ctx.textAlign='left';ctx.fillText('Moon',msp.x+mr+3,msp.y+4);
    tapTargets.push({x:msp.x,y:msp.y,r:mr*2,d:{type:'moon',mn,pos:mp}});
  }

  // Update time display
  const n=new Date();
  document.getElementById('td').textContent=
    `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')} · ${LAT.toFixed(1)}°${LAT>=0?'N':'S'}`;
}

// ── AUTO REDRAW every 30s
setInterval(draw,30000);

// ── INPUT
let panning=false,lx=0,ly=0,tsx=0,tsy=0,ts=0,moved=false,pinch=0;
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    panning=true;moved=false;
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;tsx=lx;tsy=ly;ts=Date.now();
  }else if(e.touches.length===2){
    panning=false;
    pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});

CV.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&panning&&!arMode){
    const dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;
    if(Math.abs(dx)+Math.abs(dy)>2)moved=true;
    const sc=(90/zoom)/(Math.min(W,H)*0.46);
    vAz=(vAz-dx*sc+360)%360;vAlt=Math.max(-10,Math.min(88,vAlt+dy*sc));
    lx=e.touches[0].clientX;ly=e.touches[0].clientY;
    draw();
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinch>0){zoom=Math.max(0.3,Math.min(8,zoom*(d/pinch)));draw();}
    pinch=d;moved=true;
  }
},{passive:false});

CV.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!moved&&e.changedTouches.length===1&&Date.now()-ts<300&&Math.hypot(e.changedTouches[0].clientX-tsx,e.changedTouches[0].clientY-tsy)<12){
    const tx=e.changedTouches[0].clientX,ty=e.changedTouches[0].clientY;
    handleTap(tx,ty);
  }
  panning=false;
},{passive:false});

function handleTap(tx,ty){
  let best=null,bd=60;
  tapTargets.forEach(t=>{
    const d=Math.hypot(t.x-tx,t.y-ty);
    if(d<t.r&&d<bd){bd=d;best=t;}
  });
  if(best)showInfo(best.d);
  else closeInfo();
}

// ── INFO
const SDESC={
'Sirius':'The brightest star in the sky at just 8.6 light-years away. Its blue-white light comes from a surface temperature of 9,940 K — twice as hot as our Sun.',
'Betelgeuse':'A red supergiant 700 light-years away. So large it would extend past Jupiter if placed at the Sun. Expected to explode as a supernova within 100,000 years.',
'Rigel':'A blue supergiant 860 light-years away, radiating 120,000 times more energy than our Sun.',
'Vega':'Part of the Summer Triangle, 25 light-years away. Will replace Polaris as the North Star in 13,727 years.',
'Arcturus':'The brightest northern star, 37 light-years away. A red giant 25 times larger than the Sun.',
'Capella':'Actually four stars in two binary pairs orbiting each other, 43 light-years away.',
'Procyon':'Just 11.46 light-years away — the 7th nearest star system to Earth.',
'Altair':'Spinning so fast it is visibly flattened at its poles. 17 light-years away.',
'Aldebaran':'The fiery eye of Taurus, a red giant 65 light-years away following the Pleiades.',
'Spica':'Two massive stars orbiting so close they are pulled into egg-shapes, 250 light-years away.',
'Antares':'Heart of Scorpius — a red supergiant so vast it would engulf Mars if placed at our Sun.',
'Deneb':'One of the most luminous stars known — possibly 200,000× the Sun\'s output from 2,600 light-years.',
'Polaris':'The North Star, within 1° of the celestial north pole. Has guided navigators for millennia.',
'Regulus':'The heart of Leo, spinning so fast it loses mass from its equator.',
'Fomalhaut':'A young star with a debris disk — direct evidence of planet formation. 25 light-years away.',
'Pollux':'The nearest giant star to Earth at 34 light-years. Hosts a confirmed exoplanet.',
};

function phaseName(p){
  const names=['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  return names[Math.round(p/45)%8];
}

function showInfo(data){
  sel=data;
  let tl='',nm='',sub='',desc='',stats=[];
  if(data.type==='star'){
    const [name,ra,dec,vmag,bv,con]=data.s;
    tl='STAR · '+con;nm=name;sub=`Magnitude ${vmag} · ${con}`;
    desc=SDESC[name]||`A star of magnitude ${vmag} in ${con}.`;
    stats=[{l:'Magnitude',v:vmag.toFixed(2)},{l:'Altitude',v:data.pos.alt.toFixed(1)+'°'},{l:'Azimuth',v:data.pos.az.toFixed(0)+'°'},{l:'B-V Colour',v:bv.toFixed(2)}];
  }else if(data.type==='dso'){
    const [name,ra,dec,type,vmag,d,con,id]=data.dso;
    const tmap={galaxy:'GALAXY',globular:'GLOBULAR CLUSTER',cluster:'OPEN CLUSTER',nebula:'NEBULA',planetary:'PLANETARY NEBULA',remnant:'SUPERNOVA REMNANT'};
    tl=(tmap[type]||'DEEP SKY OBJECT')+' · '+con;nm=name;sub=(id?id+' · ':'')+`Magnitude ${vmag}`;desc=d;
    stats=[{l:'Type',v:tmap[type]||type},{l:'Magnitude',v:vmag.toFixed(1)},{l:'Altitude',v:data.pos.alt.toFixed(1)+'°'},{l:'Constellation',v:con}];
  }else if(data.type==='planet'){
    const pl=data.pl;
    tl='PLANET · SOLAR SYSTEM';nm=pl.n;sub='At '+data.pos.alt.toFixed(1)+'° altitude · '+data.pos.az.toFixed(0)+'° azimuth';
    desc=pl.d;stats=[{l:'Altitude',v:data.pos.alt.toFixed(1)+'°'},{l:'Azimuth',v:data.pos.az.toFixed(0)+'°'}];
  }else{
    const mn=data.mn;
    tl='NATURAL SATELLITE · EARTH';nm='The Moon';
    sub=phaseName(mn.phase)+' · '+mn.ill+'% illuminated';
    desc='Our nearest neighbour at 384,400 km. The Moon\'s gravity creates tides and has stabilized Earth\'s axial tilt for billions of years, making complex life possible.';
    stats=[{l:'Phase',v:phaseName(mn.phase)},{l:'Illumination',v:mn.ill+'%'},{l:'Distance',v:'~384,400 km'}];
  }
  document.getElementById('ip-t').textContent=tl;
  document.getElementById('ip-n').textContent=nm;
  document.getElementById('ip-s').textContent=sub;
  document.getElementById('ip-d').textContent=desc;
  document.getElementById('ip-st').innerHTML=stats.map(s=>`<div class="isc"><div class="isl">${s.l}</div><div class="isv">${s.v}</div></div>`).join('');
  document.getElementById('info').classList.add('show');
  rn('OBJECT_IDENTIFIED',{name:nm,type:data.type,description:desc});
}

function closeInfo(){document.getElementById('info').classList.remove('show');sel=null;}

// ── BUTTONS
document.getElementById('ic').onclick=closeInfo;
document.getElementById('bClose').onclick=closeInfo;

document.getElementById('bAtlas').onclick=()=>{
  if(!sel)return;
  const nm=document.getElementById('ip-n').textContent;
  const desc=document.getElementById('ip-d').textContent;
  const con=sel.type==='star'?sel.s[5]:(sel.type==='dso'?sel.dso[6]:'');
  rn('ADD_TO_ATLAS',{name:nm,type:sel.type,constellation:con,description:desc,method:'skymap'});
  const b=document.getElementById('bAtlas');b.textContent='✓ Added!';b.style.background='#4dff91';
  setTimeout(()=>{b.textContent='+ Add to Atlas';b.style.background='';},2000);
};

document.getElementById('bL').onclick=()=>{
  if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>{
    LAT=p.coords.latitude;LON=p.coords.longitude;draw();
    rn('LOCATION_SET',{lat:LAT,lon:LON});
  });
};

document.getElementById('bT').onclick=()=>{
  const items=[];
  DSOS.forEach(d=>{const p=toAltAz(d[1],d[2]);if(p.alt>15&&d[4]<9)items.push({n:d[0],alt:p.alt});});
  PLANETS.forEach(pl=>{const c=planetPos(pl);const p=toAltAz(c.ra,c.dec);if(p.alt>10)items.push({n:pl.n,alt:p.alt});});
  items.sort((a,b)=>b.alt-a.alt);
  alert('BEST TONIGHT:\n'+items.slice(0,8).map(i=>`${i.n} — ${i.alt.toFixed(0)}°`).join('\n'));
};

document.getElementById('bAR').onclick=()=>{
  arMode=!arMode;
  document.getElementById('bAR').classList.toggle('on',arMode);
  document.getElementById('arbar').classList.toggle('show',arMode);
  rn('AR_TOGGLE',{enabled:arMode});
};

document.getElementById('bZI').onclick=()=>{zoom=Math.min(8,zoom*1.3);draw();};
document.getElementById('bZO').onclick=()=>{zoom=Math.max(0.3,zoom/1.3);draw();};

// ── START
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(p=>{
    LAT=p.coords.latitude;LON=p.coords.longitude;draw();
    rn('LOCATION_SET',{lat:LAT,lon:LON});
  },()=>draw());
}else{draw();}

rn('MAP_READY',{version:'5.0-canvas'});
</script>
